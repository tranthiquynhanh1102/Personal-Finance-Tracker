<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finora - Personal Finance Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Finora</h1>
        <p class="subtitle">Budget & Expense Manager</p>
      </header>

      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="card balance-card">
          <div class="card-icon"><i class="fas fa-wallet"></i></div>
          <p class="label">Total Balance</p>
          <h2 id="total-balance" class="amount">0 $</h2>
        </div>
        <div class="card income-card">
          <div class="card-icon"><i class="fas fa-arrow-trend-up"></i></div>
          <p class="label">Total Income</p>
          <h2 id="total-income" class="amount">0 $</h2>
        </div>
        <div class="card expense-card">
          <div class="card-icon"><i class="fas fa-arrow-trend-down"></i></div>
          <p class="label">Total Expenses</p>
          <h2 id="total-expense" class="amount">0 $</h2>
        </div>
      </div>

      <!-- Add Transaction Form -->
      <div class="form-card">
        <h3>New Transaction</h3>
        <form id="transaction-form">
          <div class="form-group">
            <input
              type="text"
              id="description"
              placeholder="Transaction description (e.g. Salary, Groceries)"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <input
                type="number"
                id="amount"
                placeholder="Amount ($)"
                step="0.01"
                min="0.01"
                required
              />
            </div>
            <div class="form-group">
              <select id="type" required>
                <option value="">Select type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
          </div>
          <button type="submit" class="submit-btn">
            <i class="fas fa-plus"></i> Save Transaction
          </button>
        </form>
      </div>

      <!-- Transaction History -->
      <div class="history-card">
        <div class="history-header">
          <h3>Recent Activity</h3>
          <button id="clear-all" class="clear-btn">
            <i class="fas fa-trash"></i> Clear All
          </button>
        </div>
        <div id="transaction-list" class="transaction-list"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
